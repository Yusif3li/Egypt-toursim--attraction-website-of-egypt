<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign-Up</title>
        <link rel="stylesheet" type="text/css" href="style/sign-up.css">
    </head>
    <body>

        <!-- Header section -->

        <header>
            <div class="identity">
                <img class="logo" src="resources/pyramid-logo.png">
                <a  class="name">Egypt Tour</a>
            </div>
           
        </header>
        
        <!-- Form section -->
<div class="">
        <div class="form">
            <p class="title">
                <span class="circle"></span> 
                <span class="pulse"></span>
                Register 
            </p>
            <p class="message">Signup now and get full access to our app. </p>
                <div class="flex">
                    <label>
                        <input class="input" type="text" id="firstName" placeholder="" required="">
                        <span>First name</span>
                    </label>
            
                    <label>
                        <input class="input" type="text" id="lastName" placeholder="" required="">
                        <span>Last name</span>
                    </label>
                </div>  
                    
            <label>
                <input class="input" type="email" id="email" placeholder="" required="">
                <span>Email</span>
            </label> 
                
            <label>
                <input class="input" type="password"id="password" placeholder="" required="">
                <span>Password</span>
            </label>

            <label>
                <input class="input" type="password" id="confirmPassword" placeholder="" required="">
                <span>Confirm password</span>
            </label>
            
            <button class="submit" type="submit" onclick="signUp()">Submit</button>
            <p class="signin">Already have an acount ? <a href="sign-in.html">log-in</a> </p>
        </div>
    </div>
        
        <script src="signup.js"></script>
    </body>
</html>
